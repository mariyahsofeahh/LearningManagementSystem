<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Course Module - Catalog</title>
    <link rel="stylesheet" href="css/course.css">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>LMS</h2>
        <a href="course-catalog.html" class="active">📚 Course Catalog</a>
        <a href="#">🏠 Dashboard</a>
        <a href="#">👨‍🎓 My Courses</a>
        <a href="#">📊 Grades</a>
    </div>

    <div class="main">
        <h1>Learning Management System (LMS)</h1>
        <p class="subtitle">Explore available courses and enroll in your academic tracking pipeline</p>

        <div id="catalogGrid" class="grid">
            </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:3000/api/courses";

    async function loadCatalog() {
        try {
            const res = await fetch(`${API_URL}/all`);
            const courses = await res.json();
            const container = document.getElementById('catalogGrid');
            
            container.innerHTML = courses.map(c => `
                <div class="card">
                    <h3>${c.title}</h3>
                    <div class="info">
                        <span class="due">Code: <b>${c.courseCode}</b></span>
                        <span class="status open">Available</span>
                    </div>
                    <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">
                        ${c.description.substring(0, 90)}...
                    </p>
                    <div style="display: flex; gap: 10px;">
                        <a href="course-details.html?id=${c._id}" class="btn-link secondary" style="width: 40%;">Details</a>
                        <button onclick="enroll('${c._id}')" style="width: 60%;">Enrol Now</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error("Data Layer fetch failed:", err);
        }
    }

    async function enroll(courseId) {
        const res = await fetch(`${API_URL}/enroll`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId: "S76237", courseId: courseId })
        });
        if (res.ok) alert("Successfully Enrolled!");
    }

    window.onload = loadCatalog;
</script>
</body>
</html>
