<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS | Course Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #002b5c; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Learning Management System (LMS)</a>
            <span class="badge bg-info text-dark">Student View</span>
        </div>
    </nav>

    <div class="container">
        <h2 class="fw-bold mb-4">Explore Courses</h2>
        <div id="catalogGrid" class="row g-4"></div>
    </div>

    <script>
        const API_URL = "http://localhost:3000/api/courses"; // Use localhost for local testing

        async function loadCatalog() {
            const res = await fetch(`${API_URL}/all`);
            const courses = await res.json();
            const container = document.getElementById('catalogGrid');
            container.innerHTML = courses.map(c => `
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm p-3">
                        <div class="card-body">
                            <h6 class="text-primary">${c.courseCode}</h6>
                            <h5 class="card-title">${c.title}</h5>
                            <p class="text-muted small">${c.description.substring(0, 80)}...</p>
                        </div>
                        <div class="card-footer bg-transparent border-0 d-grid gap-2">
                            <a href="course-details.html?id=${c._id}" class="btn btn-outline-primary">View Details</a>
                            <button onclick="enroll('${c._id}')" class="btn btn-success">Enrol Now</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function enroll(courseId) {
            const res = await fetch(`${API_URL}/enroll`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ studentId: "S76237", courseId: courseId })
            });
            if (res.ok) alert("Successfully Enrolled!");
        }
        loadCatalog();
    </script>
</body>
</html>
