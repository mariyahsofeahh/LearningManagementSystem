<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS | Course Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #002b5c; }
        .hero-header { background: white; padding: 40px 0; border-bottom: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-0">
        <div class="container"><a class="navbar-brand" href="index.html">Learning Management System (LMS)</a></div>
    </nav>

    <div class="hero-header mb-5">
        <div class="container">
            <div id="headerContent">
                <h1 class="display-5 fw-bold">Loading...</h1>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 border-0 shadow-sm">
                    <h5>Course Description & Syllabus</h5>
                    <p id="fullDesc" class="text-muted">Content loading from Application Layer...</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 border-0 shadow-sm bg-white">
                    <h6 class="text-uppercase text-muted">Enrollment</h6>
                    <button class="btn btn-success btn-lg w-100 mt-2">Enrol in Course</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-5 shadow-sm">
                    <h1 id="courseTitle" class="fw-bold"></h1>
                    <p id="courseCode" class="badge bg-primary fs-6"></p>
                    <hr>
                    <p id="courseDesc" class="lead text-muted"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function fetchDetails() {
            const res = await fetch(`http://localhost:3000/api/courses/${id}`);
            const data = await res.json();
            document.getElementById('courseTitle').innerText = data.title;
            document.getElementById('courseCode').innerText = data.courseCode;
            document.getElementById('courseDesc').innerText = data.description;
        }
        fetchDetails();
    
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');

        async function fetchDetails() {
            const res = await fetch(`https://your-backend-on-koyeb.koyeb.app/api/courses/${courseId}`);
            const data = await res.json();
            document.getElementById('headerContent').innerHTML = `
                <span class="badge bg-primary mb-2">${data.courseCode}</span>
                <h1 class="display-5 fw-bold">${data.title}</h1>
            `;
            document.getElementById('fullDesc').innerText = data.description;
        }
        fetchDetails();
    </script>
</body>
</html>
