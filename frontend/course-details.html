<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Course Module - Detail Overview</title>
    <link rel="stylesheet" href="css/course.css">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>LMS</h2>
        <a href="course-catalog.html" class="active">📚 Course Catalog</a>
        <a href="#">🏠 Dashboard</a>
        <a href="#">👨‍🎓 My Courses</a>
        <a href="#">📊 Grades</a>
    </div>

    <div class="main">
        <a href="course-catalog.html" class="back-link">← Back to Course Catalog</a>
        
        <div class="card" style="max-width: 750px; margin-top: 10px;">
            <div class="info" style="margin-bottom: 0;">
                <h1 id="courseTitle" style="margin: 0;">Loading Course Title...</h1>
                <span id="displayCourseCode" class="status open" style="background: #2563eb; align-self: center;">CODE</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
            
            <h3>Syllabus & Course Description</h3>
            <div id="fullDescription" class="content-block">
                Retrieving database registry records...
            </div>

            <button id="enrollBtn" style="margin-top: 15px; padding: 12px;">Enrol in This Course</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');
    const API_URL = "http://localhost:3000/api/courses";

    async function fetchCourseInfo() {
        if (!courseId) return;
        try {
            const res = await fetch(`${API_URL}/${courseId}`);
            const data = await res.json();

            document.getElementById('courseTitle').innerText = data.title;
            document.getElementById('displayCourseCode').innerText = data.courseCode;
            document.getElementById('fullDescription').innerText = data.description;
            
            document.getElementById('enrollBtn').onclick = async () => {
                const response = await fetch(`${API_URL}/enroll`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId: "S76237", courseId: courseId })
                });
                if (response.ok) alert("Successfully Enrolled!");
            };
        } catch (err) {
            console.error(err);
        }
    }
    window.onload = fetchCourseInfo;
</script>
</body>
</html>
