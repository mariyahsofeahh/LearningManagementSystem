<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Course Module - Detail Overview</title>
    <link rel="stylesheet" href="css/course.css">
</head>
<body>

<div class="detail-container">
    <a href="course-catalog.html" class="back-link">← Back to Course Catalog</a>
    
    <div class="card" style="padding: 30px;">
        <div>
            <span id="displayCourseCode" class="code-badge">LOADING...</span>
            <h1 id="courseTitle" style="margin-top: 15px;">Loading Course Title</h1>
            <hr style="border: 0; border-top: 1px solid #dadce0; margin-vertical: 20px;">
            
            <h3>Syllabus & Course Description</h3>
            <div id="fullDescription" class="content-block">
                Retrieving registry data metrics...
            </div>
        </div>

        <button id="enrollBtn" style="margin-top: 25px; width: 100%; padding: 12px;">Enrol in This Course</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');
    const API_URL = "http://localhost:3000/api/courses";

    async function fetchCourseInfo() {
        if (!courseId) return;
        try {
            const res = await fetch(`${API_URL}/${courseId}`);
            const data = await res.json();

            document.getElementById('courseTitle').innerText = data.title;
            document.getElementById('displayCourseCode').innerText = data.courseCode;
            document.getElementById('fullDescription').innerText = data.description;
            
            document.getElementById('enrollBtn').onclick = async () => {
                const response = await fetch(`${API_URL}/enroll`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId: "S76237", courseId: courseId })
                });
                if (response.ok) alert("Successfully Enrolled!");
            };
        } catch (err) {
            console.error(err);
        }
    }
    window.onload = fetchCourseInfo;
</script>
</body>
</html>
