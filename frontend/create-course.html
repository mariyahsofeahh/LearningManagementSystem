<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Course Module - Lecturer Panel</title>
    <link rel="stylesheet" href="css/course.css">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>LMS</h2>
        <a href="#" class="active">📝 Course Management</a>
        <a href="#">🏠 Dashboard</a>
        <a href="#">📋 View Metrics</a>
    </div>

    <div class="main">
        <h1>Create New LMS Course</h1>
        <p class="subtitle">Publish academic course schemas directly to the tracking database catalog tier</p>
        
        <div class="card" style="max-width: 550px;">
            <form id="createForm">
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="code" placeholder="e.g., CSF3043" required>
                </div>
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="title" placeholder="e.g., Object-Oriented Programming" required>
                </div>
                <div class="form-group">
                    <label>Syllabus Description</label>
                    <textarea id="desc" rows="6" placeholder="Provide course requirements and layout details..." required></textarea>
                </div>
                <button type="submit">Publish Course</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('createForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            courseCode: document.getElementById('code').value,
            title: document.getElementById('title').value,
            description: document.getElementById('desc').value,
            lecturerId: "LECT001"
        };
        await fetch("http://localhost:3000/api/courses/create", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        window.location.href = "course-catalog.html";
    });
</script>
</body>
</html>
