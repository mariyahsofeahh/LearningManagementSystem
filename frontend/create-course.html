<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Course Module - Lecturer Panel</title>
    <link rel="stylesheet" href="css/course.css">
</head>
<body>

<div class="padded-container">
    <div class="card">
        <h2>Create New LMS Course</h2>
        <p class="subtitle" style="margin-bottom: 20px;">Add code variables and publish syllabi tracking matrices directly to the catalog registry database tier.</p>
        
        <form id="createForm">
            <div class="form-group">
                <label>Course Code</label>
                <input type="text" id="code" placeholder="e.g. CSF3043" required>
            </div>
            <div class="form-group">
                <label>Course Title</label>
                <input type="text" id="title" placeholder="e.g. Object-Oriented Programming" required>
            </div>
            <div class="form-group">
                <label>Syllabus Description</label>
                <textarea id="desc" rows="6" placeholder="Enter full layout syllabus structure guidelines..." required></textarea>
            </div>
            <button type="submit" style="width: 100%;">Publish Course to Catalog</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('createForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            courseCode: document.getElementById('code').value,
            title: document.getElementById('title').value,
            description: document.getElementById('desc').value,
            lecturerId: "LECT001"
        };
        await fetch("http://localhost:3000/api/courses/create", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        window.location.href = "course-catalog.html";
    });
</script>
</body>
</html>
