<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Course Module - Modify Workspace</title>
    <link rel="stylesheet" href="css/course.css">
</head>
<body>

<div class="padded-container">
    <div class="card">
        <h2>Edit Course System Registry</h2>
        <p class="subtitle" style="margin-bottom: 20px;">Modify structural descriptions or titles within the Learning Management System (LMS) schema.</p>
        
        <form id="editForm">
            <div class="form-group">
                <label>Update Course Title</label>
                <input type="text" id="editTitle" required>
            </div>
            <div class="form-group">
                <label>Modify Course Description</label>
                <textarea id="editDesc" rows="6" required></textarea>
            </div>
            <button type="submit" style="width: 100%;">Save Structural Changes</button>
        </form>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const API_URL = "http://localhost:3000/api/courses";

    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await fetch(`${API_URL}/update/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDesc').value
            })
        });
        alert("Update functional changes complete!");
        window.location.href = "course-catalog.html";
    });
</script>
</body>
</html>
