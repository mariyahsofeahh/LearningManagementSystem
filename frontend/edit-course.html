<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS | Edit Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #002b5c; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container"><a class="navbar-brand" href="index.html">Learning Management System (LMS)</a></div>
    </nav>

    <div class="container" style="max-width: 800px;">
        <div class="card shadow-sm p-4 border-0">
            <h3 class="mb-4">Edit Course Details</h3>
            <form id="editForm">
                <input type="text" id="editTitle" class="form-control mb-3" placeholder="Title">
                <textarea id="editDesc" class="form-control mb-3" rows="5" placeholder="Description"></textarea>
                <button type="submit" class="btn btn-warning w-100">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch(`https://your-backend-on-koyeb.koyeb.app/api/courses/update/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: document.getElementById('editTitle').value,
                    description: document.getElementById('editDesc').value
                })
            });
            alert("Update complete!");
            window.location.href = "course-catalog.html";
        });
    </script>
</body>
</html>
