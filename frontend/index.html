<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LMS - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">

      <!-- Logo / Title -->
      <div class="text-center mb-4">
        <h2>📚 Cloud-Native LMS</h2>
        <p class="text-muted">Login to your account</p>
      </div>

      <!-- Error Message -->
      <div id="error-msg" class="alert alert-danger d-none"></div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password">
      </div>

      <!-- Login Button -->
      <button onclick="handleLogin()" class="btn btn-primary w-100 mb-3 "><a href="material-student.html">Login</button>

      <!-- Register Link -->
      <p class="text-center">Don't have an account? <a href="register.html">Register here</a></p>

    </div>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      // Basic validation
      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.classList.remove('d-none');
        return;
      }

      try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.message || 'Login failed. Try again.';
          errorMsg.classList.remove('d-none');
        }

      } catch (err) {
        errorMsg.textContent = 'Cannot connect to server. Make sure backend is running.';
        errorMsg.classList.remove('d-none');
      }
    }
  </script>

</body>
</html>
