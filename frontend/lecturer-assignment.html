<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lecturer Assignment Dashboard</title>

    <!-- IMPORTANT: FIXED PATH -->
    <link rel="stylesheet" href="../../css/assignment.css">

    <style>
        /* EXTRA SAFE STYLES (so it works even if CSS missing) */

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f3f4;
        }

        .container {
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1558b0;
        }

        /* MODAL */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 10px;
        }

        .submission {
            background: #f8f9fa;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .close-btn {
            background: red;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <h1>Assignments</h1>
    <p>Manage assignments and student submissions</p>

    <!-- ASSIGNMENT CARDS -->
    <div class="grid">

        <div class="card">
            <h3>OS Scheduling</h3>
            <p>Due: 20 May 2026</p>
            <button onclick="openModal('OS Scheduling')">View Submissions</button>
        </div>

        <div class="card">
            <h3>Database Design</h3>
            <p>Due: 25 May 2026</p>
            <button onclick="openModal('Database Design')">View Submissions</button>
        </div>

        <div class="card">
            <h3>Web System</h3>
            <p>Due: 1 June 2026</p>
            <button onclick="openModal('Web System')">View Submissions</button>
        </div>

    </div>

</div>

<!-- SUBMISSION MODAL -->
<div id="modal" class="popup">

    <div class="popup-content">

        <h2 id="title">Submissions</h2>

        <div class="submission">
            <b>Ali</b><br>
            assignment1.pdf
        </div>

        <div class="submission">
            <b>Siti</b><br>
            assignment2.docx
        </div>

        <div class="submission">
            <b>John</b><br>
            project.zip
        </div>

        <button class="close-btn" onclick="closeModal()">Close</button>

    </div>

</div>

<!-- JAVASCRIPT -->
<script>
function openModal(title) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("title").innerText = title + " - Submissions";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
