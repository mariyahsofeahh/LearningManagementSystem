<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Course Materials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Course Materials</h2>
            <div class="w-25">
                <input type="text" class="form-control" placeholder="Search materials...">
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="bg-secondary text-white text-center py-5 rounded-top">
                        <i class="bi bi-file-earmark-pdf fs-1"></i>
                    </div>
                    <div class="card-body">
                        <h6 class="card-title">01. Fundamentals of Architecture</h6>
                        <p class="text-muted small">Uploaded: May 12, 2026</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-sm">View Online</button>
                            <button class="btn btn-outline-secondary btn-sm">Download</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="bg-dark text-white text-center py-5 rounded-top">
                        <i class="bi bi-play-circle fs-1"></i>
                    </div>
                    <div class="card-body">
                        <h6 class="card-title">Video Lecture: Cloud Systems</h6>
                        <p class="text-muted small">Uploaded: May 14, 2026</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-sm">Play Video</button>
                            <button class="btn btn-outline-secondary btn-sm">Download</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
