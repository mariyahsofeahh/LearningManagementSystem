<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LMS - View Materials</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary px-4 d-flex justify-content-between">
    <span class="navbar-brand fw-bold">📚 Learning Materials — Student View</span>
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">← Back to Dashboard</a>
  </nav>

  <div class="container mt-4">

    <!-- Search Bar -->
    <div class="mb-4">
      <input type="text" id="search" class="form-control" 
        placeholder="🔍 Search materials by title..." onkeyup="filterMaterials()">
    </div>

    <!-- Materials Grid -->
    <div id="material-list" class="row g-4">
      <p class="text-muted text-center">Loading materials...</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    let allMaterials = [];

    // ---- Load Materials ----
    async function loadMaterials() {
      const res = await fetch('http://localhost:5000/api/materials', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      allMaterials = await res.json();
      renderMaterials(allMaterials);
    }

    // ---- Render Materials ----
    function renderMaterials(materials) {
      const container = document.getElementById('material-list');
      container.innerHTML = '';

      if (!materials.length) {
        container.innerHTML = '<p class="text-muted text-center">No materials available yet.</p>';
        return;
      }

      materials.forEach(m => {
        container.innerHTML += `
          <div class="col-md-4">
            <div class="card shadow-sm h-100">
              <div class="card-header bg-primary text-white">
                📄 ${m.title}
              </div>
              <div class="card-body">
                <p class="card-text text-muted">${m.description || 'No description provided.'}</p>
                <small class="text-secondary">
                  Uploaded by: <strong>${m.uploadedBy?.name || 'Lecturer'}</strong>
                </small>
              </div>
              <div class="card-footer">
                <a href="${m.fileUrl}" target="_blank" class="btn btn-primary w-100">
                  📥 Open Material
                </a>
              </div>
            </div>
          </div>
        `;
      });
    }

    // ---- Search / Filter ----
    function filterMaterials() {
      const keyword = document.getElementById('search').value.toLowerCase();
      const filtered = allMaterials.filter(m =>
        m.title.toLowerCase().includes(keyword)
      );
      renderMaterials(filtered);
    }

    loadMaterials();
  </script>

</body>
</html>
