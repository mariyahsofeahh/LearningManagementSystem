<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer - Manage Materials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .upload-zone {
            border: 2px dashed #0d6efd;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            transition: 0.3s;
        }
        .upload-zone:hover { background: #e9ecef; cursor: pointer; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Learning Material Management</h2>
        
        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <h5 class="card-title">Upload New Material</h5>
                <div class="upload-zone mt-3">
                    <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>
                    <p class="mt-2">Drag and drop "heavy" materials (PDF, MP4) or click to browse</p>
                    <input type="file" class="d-none" id="fileInput">
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">Your Uploaded Materials</h5>
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>File Name</th>
                            <th>Type</th>
                            <th>Date Uploaded</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Lecture_01_Introduction.pdf</td>
                            <td><span class="badge bg-danger">PDF</span></td>
                            <td>May 10, 2026</td>
                            <td><i class="bi bi-cloud-check text-success"></i> S3 Synced</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
